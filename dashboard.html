<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>TokoKu</h1>

        <nav>
            <a href="#">Beranda</a>
            <a href="#">Produk</a>
            <a href="#">Kontak</a>
            <a href="login.html">Logout</a>
        </nav>
    </header>

    <section class="dashboard">
        <h2>Selamat Datang di Katalog Produk</h2>
        <p>Pilih produk yang ingin dibeli.</p>
    </section>

    <section class="product-grid">

        <div class="product-card">
            <img src="https://www.sweelee.co.id/cdn/shop/products/products_2FM31-ACCS-10308_2FM31-ACCS-10308_1604391349341_1200x1200.jpg?v=1648191179" alt="Produk 1">
            <h3>Produk A</h3>
            <p>Rp50.000</p>
            <button>Beli</button>
        </div>

        <div class="product-card">
            <img src="https://cdn.ruparupa.io/fit-in/400x400/filters:format(webp)/filters:quality(90)/ruparupa-com/image/upload/Products/10576244_1.jpg" alt="Produk 2">
            <h3>Produk B</h3>
            <p>Rp75.000</p>
            <button>Beli</button>
        </div>

        <div class="product-card">
            <img src="https://haluan.co/wp-content/uploads/2025/11/684d5e915f73bafe61013a38-snpurdiri-60-wired-gaming-keyboard-rgb-1.jpg" alt="Produk 3">
            <h3>Produk C</h3>
            <p>Rp99.000</p>
            <button>Beli</button>
        </div>

        <div class="product-card">
            <img src="https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/f9b017be006641b6b32eea22ed78f5a3~tplv-aphluv4xwc-white-pad-v1:250:250.jpeg" alt="Produk 4">
            <h3>Produk D</h3>
            <p>Rp120.000</p>
            <button>Beli</button>
        </div>

    </section>

</body>
</html>
